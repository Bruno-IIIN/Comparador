name: Build Executável Portátil

on:
  push:
    paths:
      - 'src/**'
  workflow_dispatch:  # permite rodar manualmente

jobs:
  build:
    runs-on: windows-latest   # precisa ser Windows para gerar .exe

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          pip install pandas openpyxl matplotlib pyinstaller

      - name: Compilar .exe
        run: |
          pyinstaller --onefile --windowed --name "ComparadorSemanas" src/comparador_excel.py

      - name: Upload do executável
        uses: actions/upload-artifact@v4
        with:
          name: ComparadorSemanas
          path: dist/ComparadorSemanas.exe
          retention-days: 30
