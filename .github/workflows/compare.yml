name: Compilar Executável Automaticamente

on:
  push:
    branches:
      - main
      - master
  # Opcional: rodar toda semana (ex: domingo às 3h)
  schedule:
    - cron: '0 3 * * 0'
  # Permite também disparo manual, se precisar
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          pip install pandas openpyxl matplotlib pyinstaller

      - name: Compilar executável com PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "ComparadorSemanas" src/comparador_excel.py

      - name: Fazer upload do .exe como artefato
        uses: actions/upload-artifact@v4
        with:
          name: ComparadorSemanas
          path: dist/ComparadorSemanas.exe
          retention-days: 30
